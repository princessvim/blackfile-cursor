<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5/index.css">
	<style>
		:root {
			--bg:              #0a0a10;
			--surface:         #121222;
			--surface-ui:      #1a1a2b;
			--border-dim:      #20203b;
			--border-ui:       #333355;
			--text:            #d8d4f0;
			--accent:          #e0306e;
			--canvas-normal:   #23233b;
		}
        body {
            background-color: var(--bg);
			color: var(--text);
			font-family: Iosevka, "Courier New", monospace;
			font-size: 14px;
			min-height: 100vh;
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			padding-top: 3.5em;
			box-sizing: border-box;
        }
		.controls {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			padding: 0.75em 1.5em;
			background: rgba(23, 23, 42, 0.85);
			border-bottom: 1px solid var(--border-dim);
			border-top: none;
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			z-index: 30;
			display: flex;
			flex-direction: column;
			gap: 0.5em;
		}
		.controls-row {
			display: flex;
			align-items: center;
			gap: 0.75em;
			width: 100%;
		}
		content {
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		#width-slider {
			flex: 1;
			min-width: 80px;
		}
		#highlight-input {
			width: 6em;
			background: var(--surface-ui);
			color: var(--text);
			border: 1px solid var(--border-ui);
			border-radius: 3px;
			padding: 2px 6px;
			font-family: inherit;
			font-size: inherit;
		}
		.text-viewer {
			transform-origin: center;
			z-index: 10;
			transition: transform 260ms ease;
		}
		#text-canvas {
			display: block;
			border: 2px dashed var(--border-dim);
			border-radius: 6px;
			padding: 0.5em 0.6em 0.3em;
		}

		#rotation-select {
			background: var(--surface-ui);
			color: var(--text);
			border: 1px solid var(--border-ui);
			border-radius: 3px;
			padding: 2px 6px;
			font-family: inherit;
			font-size: inherit;
		}
		#font-size-slider {
			width: 120px;
		}
		#font-size-label {
			display: inline-block;
			min-width: 110px;
		}
		#width-label {
			display: inline-block;
			width: 130px;
		}
		#reset-button {
			margin-left: auto;
			background: var(--surface-ui);
			color: var(--text);
			border: 1px solid var(--border-ui);
			border-radius: 3px;
			padding: 2px 10px;
			font-family: inherit;
			font-size: inherit;
			cursor: pointer;
		}
		#reverse-button {
			background: var(--surface-ui);
			color: var(--text);
			border: 1px solid var(--border-ui);
			border-radius: 3px;
			padding: 2px 10px;
			font-family: inherit;
			font-size: inherit;
			cursor: pointer;
		}
		.control-toggle {
			display: inline-flex;
			align-items: center;
			gap: 0.35em;
		}

		input[type="range"] {
			-webkit-appearance: none;
			appearance: none;
			height: 3px;
			background: var(--border-ui);
			border-radius: 2px;
			outline: none;
			cursor: pointer;
		}
		input[type="range"]::-webkit-slider-runnable-track {
			background: var(--border-ui);
			height: 3px;
			border-radius: 2px;
		}
		input[type="range"]::-moz-range-track {
			background: var(--border-ui);
			height: 3px;
			border-radius: 2px;
		}
		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: var(--accent);
			cursor: pointer;
			border: none;
			margin-top: -4.5px;
		}
		input[type="range"]::-moz-range-thumb {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: var(--accent);
			cursor: pointer;
			border: none;
		}

		input[type="checkbox"] {
			-webkit-appearance: none;
			appearance: none;
			width: 13px;
			height: 13px;
			background: var(--surface-ui);
			border: 1px solid var(--border-ui);
			border-radius: 3px;
			cursor: pointer;
			position: relative;
			flex-shrink: 0;
		}
		input[type="checkbox"]:checked {
			background: var(--accent);
			border-color: var(--accent);
		}
		input[type="checkbox"]:checked::after {
			content: "";
			position: absolute;
			left: 3px;
			top: 0px;
			width: 5px;
			height: 8px;
			border: 2px solid var(--bg);
			border-top: none;
			border-left: none;
			transform: rotate(45deg);
		}


	</style>
</head>
<body>
    <content>
        <div class="controls">
			<div class="controls-row">
				<label id="width-label" for="width-slider">Width: <span id="width-value">67</span> letters</label>
				<input id="width-slider" type="range" min="10" max="400" value="67">
				<label for="highlight-input">Highlight character(s):</label>
				<input id="highlight-input" type="text" value="/" placeholder="chars to highlight">
			</div>
			<div class="controls-row">
				<label id="font-size-label" for="font-size-slider">Font size: <span id="font-size-value">18</span>px</label>
				<input id="font-size-slider" type="range" min="6" max="48" value="18">
				<label for="rotation-select">Rotate:</label>
				<select id="rotation-select">
					<option value="0">0</option>
					<option value="90">90</option>
					<option value="180">180</option>
					<option value="270">270</option>
				</select>
				<label class="control-toggle" for="mirror-horizontal">
					<input id="mirror-horizontal" type="checkbox">
					Mirror horizontal
				</label>
				<label class="control-toggle" for="mirror-vertical">
					<input id="mirror-vertical" type="checkbox">
					Mirror vertical
				</label>
				<label class="control-toggle" for="invert-colors">
					<input id="invert-colors" type="checkbox">
					Invert colors
				</label>
				<button id="reverse-button" type="button">Reverse text</button>
				<button id="reset-button" type="button">Reset</button>
			</div>
        </div>
		<div class="text-viewer">
			<canvas id="text-canvas"></canvas>
		</div>
    </content>
    
    <script>
        const text = "data:image/x-icon;base64,AAACAAEAICACAAAAAAgIAAAFgAAAEgAAACgAAAAgAAAAQAAAAAEAIAAAAAAAgEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABwcHAAAAAAAADw8PAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADg4OAAAAAAAADw8PAAAAAAAABwcHAAAAAAAAAAAAD//////////8AAAAAAAD/////////8AAAAAAADwAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPAAAAP//8AAAAAAAPgAAAP//8AAAAAAAP////////////////8AAAAAAAD/////////8AAAAAAA//////////8AAAAAAAAPAAAAAAAA8AAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAADwAAAAAAAAPAAAAAAAA8AAAAAAA//////////8AAA==";

		let currentText = text;

		const codeEditor = document.querySelector(".text-viewer");
		const canvas = document.querySelector("#text-canvas");
		const ctx = canvas ? canvas.getContext("2d") : null;
		const widthSlider = document.querySelector("#width-slider");
		const widthValue = document.querySelector("#width-value");
		const highlightInput = document.querySelector("#highlight-input");
		const fontSizeSlider = document.querySelector("#font-size-slider");
		const fontSizeValue = document.querySelector("#font-size-value");
		const rotationSelect = document.querySelector("#rotation-select");
		const mirrorHorizontal = document.querySelector("#mirror-horizontal");
		const mirrorVertical = document.querySelector("#mirror-vertical");
		const invertColors = document.querySelector("#invert-colors");
		const reverseButton = document.querySelector("#reverse-button");
		const resetButton = document.querySelector("#reset-button");
		const defaults = {
			width: "67",
			highlight: "/",
			fontSize: "18",
			rotation: "0",
			mirrorHorizontal: false,
			mirrorVertical: false,
			invertColors: false
		};

		function wrapText(str, charCount) {
			const lines = [];
			for (const rawLine of str.split(/\r?\n/)) {
				const chars = [...rawLine];
				if (chars.length === 0) {
					lines.push([]);
				} else {
					for (let i = 0; i < chars.length; i += charCount) {
						lines.push(chars.slice(i, i + charCount));
					}
				}
			}
			if (lines.length === 0) lines.push([]);
			return lines;
		}

		function renderCanvas() {
			if (!canvas || !ctx) return;

			const fontSize = fontSizeSlider ? parseInt(fontSizeSlider.value) : 16;
			const charCount = widthSlider ? parseInt(widthSlider.value) : 67;
			const lineHeight = fontSize * 1.45;
			const padding = 0;
			const fontStr = `${fontSize}px "Iosevka", "Courier New", monospace`;

			ctx.font = fontStr;
			const glyphWidth = ctx.measureText("M").width;
			const cellWidth = glyphWidth + 1;

			const lines = wrapText(currentText, charCount);
			const logicalWidth = Math.ceil(charCount * cellWidth);
			const logicalHeight = Math.ceil(lines.length * lineHeight);

			const dpr = window.devicePixelRatio || 1;
			canvas.width = Math.ceil(logicalWidth * dpr);
			canvas.height = Math.ceil(logicalHeight * dpr);
			canvas.style.width = `${logicalWidth}px`;
			canvas.style.height = `${logicalHeight}px`;

			ctx.scale(dpr, dpr);
			ctx.clearRect(0, 0, logicalWidth, logicalHeight);
			ctx.font = fontStr;
			ctx.textBaseline = "middle";
			ctx.textAlign = "center";

			const highlightChars = new Set(highlightInput ? highlightInput.value : "/");
			const isInverted = invertColors && invertColors.checked;
			const style = getComputedStyle(document.documentElement);
			const accentColor = style.getPropertyValue('--accent').trim();
			const canvasNormal = style.getPropertyValue('--canvas-normal').trim();
			const normalColor = isInverted ? accentColor : canvasNormal;
			const highlightColor = isInverted ? canvasNormal : accentColor;

			for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
				const line = lines[lineIdx];
				for (let charIdx = 0; charIdx < line.length; charIdx++) {
					const char = line[charIdx];
					const x = charIdx * cellWidth + cellWidth / 2;
					const y = lineIdx * lineHeight + lineHeight / 2;
					ctx.fillStyle = highlightChars.has(char) ? highlightColor : normalColor;
					ctx.fillText(char, x, y);
				}
			}
		}

		function applyTransform() {
			if (!codeEditor) return;
			const rotation = rotationSelect ? Number(rotationSelect.value) : 0;
			const scaleX = mirrorHorizontal && mirrorHorizontal.checked ? -1 : 1;
			const scaleY = mirrorVertical && mirrorVertical.checked ? -1 : 1;
			codeEditor.style.transform = `rotate(${rotation}deg) scale(${scaleX}, ${scaleY})`;
		}

		if (widthSlider && widthValue) {
			widthSlider.addEventListener("input", () => {
				widthValue.textContent = widthSlider.value;
				renderCanvas();
			});
		}
		if (highlightInput) {
			highlightInput.addEventListener("input", renderCanvas);
		}
		if (fontSizeSlider && fontSizeValue) {
			fontSizeSlider.addEventListener("input", () => {
				fontSizeValue.textContent = fontSizeSlider.value;
				renderCanvas();
			});
		}
		if (rotationSelect) {
			rotationSelect.addEventListener("change", applyTransform);
		}
		if (mirrorHorizontal) {
			mirrorHorizontal.addEventListener("change", applyTransform);
		}
		if (mirrorVertical) {
			mirrorVertical.addEventListener("change", applyTransform);
		}
		if (invertColors) {
			invertColors.addEventListener("change", renderCanvas);
		}
		if (reverseButton) {
			reverseButton.addEventListener("click", () => {
				currentText = [...currentText].reverse().join("");
				renderCanvas();
			});
		}
		if (resetButton) {
			resetButton.addEventListener("click", () => {
				currentText = text;
				if (widthSlider && widthValue) {
					widthSlider.value = defaults.width;
					widthValue.textContent = defaults.width;
				}
				if (highlightInput) {
					highlightInput.value = defaults.highlight;
				}
				if (fontSizeSlider && fontSizeValue) {
					fontSizeSlider.value = defaults.fontSize;
					fontSizeValue.textContent = defaults.fontSize;
				}
				if (rotationSelect) {
					rotationSelect.value = defaults.rotation;
				}
				if (mirrorHorizontal) {
					mirrorHorizontal.checked = defaults.mirrorHorizontal;
				}
				if (mirrorVertical) {
					mirrorVertical.checked = defaults.mirrorVertical;
				}
				if (invertColors) {
					invertColors.checked = defaults.invertColors;
				}
				applyTransform();
				renderCanvas();
			});
		}

		renderCanvas();
		applyTransform();
		document.fonts.ready.then(() => renderCanvas());
	</script>
</body>
</html>
